name: CI-CD Pipeline

on:
  push:
    branches:
      - [cite_start]main # Déclencheur sur la branche main [cite: 36]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Récupération du code source [cite: 37]
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape intermédiaire cruciale : Installation de Java et compilation du Backend
      # Cela génère le fichier /target/demo-0.0.1.jar dont Docker a besoin [cite: 13, 45]
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR with Maven
        run: mvn -f springboot/app/pom.xml clean package -DskipTests

      # Étape 2 : Connexion à Docker Hub [cite: 44]
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          [cite_start]username: ${{ secrets.DOCKERHUB_USERNAME }} # Utilisateur : nourhenelamouchi [cite: 41]
          [cite_start]password: ${{ secrets.DOCKERHUB_TOKEN }}    # Votre Access Token [cite: 42]

      # Étape 2 suite : Build et Push des images [cite: 45, 46, 47]
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      # Étape 3 : Test de l'application [cite: 49, 50]
      - name: Test Application with Docker Compose
        run: |
          docker-compose up -d 
          sleep 30 # Attente pour laisser les services démarrer [cite: 52]
          docker ps # Vérification visuelle dans les logs du workflow
