name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Récupération du code (Étape 1)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Connexion via secrets (Étape 2)
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app # Chemin vers Dockerfile backend (Étape 2)
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app # Chemin vers Dockerfile frontend (Étape 2)
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      - name: Test Application
        run: |
          docker-compose up -d # Lancement avec Docker Compose (Étape 3)
          sleep 30
          docker ps
