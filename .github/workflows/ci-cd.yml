name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Récupération du code [cite: 37]
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape indispensable pour le Backend : Compilation Java
      # Cette étape génère le fichier .jar nécessaire au Dockerfile
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR with Maven
        run: mvn -f springboot/app/pom.xml clean package -DskipTests

      # Étape 2 : Connexion à Docker Hub [cite: 44]
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 2 : Build et Push des images [cite: 45, 46, 47]
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      # Étape 3 : Test de l'application [cite: 49, 50]
      - name: Test Application
        run: |
          docker-compose up -d
          sleep 30
          docker ps
