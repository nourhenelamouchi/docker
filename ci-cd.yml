name: CI-CD Pipeline

on:
  push:
    [cite_start]branches: [ "main" ] # Déclencheur sur la branche main [cite: 36]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 # Récupération du code [cite: 37]

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          [cite_start]username: ${{ secrets.DOCKERHUB_USERNAME }} # Connexion via secrets [cite: 44]
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          [cite_start]context: ./springboot/app # Construction image backend [cite: 45]
          [cite_start]push: true # Publication sur Docker Hub [cite: 47]
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          [cite_start]context: ./angular-app # Construction image frontend [cite: 46]
          [cite_start]push: true # Publication sur Docker Hub [cite: 47]
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      - name: Test Application
        run: |
          docker-compose up -d # Lancement avec Docker Compose [cite: 50]
          sleep 30 # Attente pour le démarrage
          docker ps # Vérification des conteneurs [cite: 52]
